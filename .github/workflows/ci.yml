name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: PHP 8.1
    runs-on: ubuntu-latest

    defaults:
      run:
        # Reconcile and Unity are checked out side by side, mirroring a
        # WordPress plugins/ directory, so run everything from inside this one.
        working-directory: reconcile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: reconcile

      - name: Checkout Unity
        # Reconcile is built on Unity's interfaces; the test suite asserts
        # against the real contract rather than a copy (see tests/bootstrap.php),
        # so Unity must sit alongside as ../unity. Public repo, no token needed.
        uses: actions/checkout@v4
        with:
          repository: bleedingdeacons/unity
          ref: main
          path: unity

      - name: Checkout Sentinel
        # Scanned by phpstan.neon.dist so cross-plugin symbols resolve.
        uses: actions/checkout@v4
        with:
          repository: bleedingdeacons/sentinel
          ref: main
          path: sentinel

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          # zip: build.php assembles the release archive with ZipArchive.
          extensions: mbstring, intl, json, zip
          tools: composer:v2
          # pcov drives PHPUnit's line coverage for the Coveralls upload
          # below. Much faster than xdebug for coverage-only runs.
          coverage: pcov

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          # Keyed on composer.json: composer.lock is untracked in several of
          # these repos, so it is not a reliable cache key across the suite.
          # Scoped to this plugin's file — Unity is checked out alongside, and
          # a '**' glob would fold its composer.json into the key too.
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php8.1-composer-${{ hashFiles('reconcile/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php8.1-composer-

      # --- Gates -----------------------------------------------------------
      # These fail the build. Each is verified to pass across the suite today.

      - name: Validate composer.json
        # --no-check-lock: composer.lock is untracked in some repos and drifted
        # from composer.json in others. Lock state is reported as advisory
        # below rather than blocking every PR in the suite.
        run: composer validate --no-check-lock

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Lint PHP syntax
        # Shipped code only: tests/ is covered by the advisory test run, and
        # some suites currently contain files that cannot be parsed.
        run: |
          status=0
          while IFS= read -r -d '' file; do
            if ! out=$(php -l "$file" 2>&1); then
              echo "$out"
              status=1
            fi
          done < <(find . -path ./vendor -prune -o -path ./build -prune \
                        -o -path ./tests -prune -o -path ./node_modules -prune \
                        -o -name '*.php' -print0)
          exit $status

      - name: Build production archive
        # The build is what /bump ships, so a broken build must fail the PR.
        run: composer build:production

      - name: PHPStan
        # A gate. phpstan.neon.dist is committed so CI actually has a config
        # — it previously ran with none at all, analysing nothing. Existing
        # findings are grandfathered in phpstan-baseline.neon, so this fails
        # only on new ones.
        run: composer phpstan

      - name: PHPUnit
        # A gate. The suite (38 tests) covers MemberImporter — including the
        # buildMember path that once silently erased GDPR consent on re-import —
        # and GroupImporter, asserting against Unity's real interfaces via the
        # ../unity checkout above. It was previously unrunnable (no bootstrap,
        # no phpunit, stale namespaces); now that it is green it guards the
        # importers on every PR.
        run: composer test -- --coverage-clover build/logs/clover.xml

      # --- Advisory --------------------------------------------------------
      # Reported but not yet enforced. Promote to a gate once a repo is green.

      - name: Upload coverage to Coveralls (advisory)
        # Reports a coverage number; does not gate the build. The Clover report
        # is produced by the PHPUnit step above. This action runs from the repo
        # root (defaults.run.working-directory does not apply to `uses:` steps),
        # so the file is under reconcile/ and base-path strips that prefix back off
        # the paths inside the report to match the repository layout.
        uses: coverallsapp/github-action@v2
        continue-on-error: true
        with:
          file: reconcile/build/logs/clover.xml
          format: clover
          base-path: reconcile
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: composer.lock up to date (advisory)
        run: composer validate
        continue-on-error: true
